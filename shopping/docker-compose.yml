version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/shopping
      - /var/www/shopping/vendor:/var/www/shopping/vendor:ro
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
    networks:
      - shopping-net

networks:
  shopping-net:
    driver: bridge
